<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects - JOSEE'S FINEST</title>
    <link rel="stylesheet" href="css/style-clean.css">
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            color: white;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .navbar {
            background: rgba(0, 0, 0, 0.8);
            padding: 5px 0;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 105, 180, 0.3);
        }
        
        .navbar h2 {
            color: #ff69b4;
            text-align: center;
            margin: 0;
            font-size: 1.5em;
        }
        
        .nav-links {
            display: flex;
            justify-content: center;
            list-style: none;
            padding: 0;
            margin: 0;
        }
        
        .nav-links li {
            margin: 0 10px;
        }
        
        .nav-links a {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            padding: 6px 12px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.1);
            font-size: 0.9em;
        }
        
        .nav-links a:hover {
            color: white;
            background: rgba(255, 105, 180, 0.3);
            transform: translateY(-2px);
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            min-height: 100vh;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        .page-title {
            text-align: center;
            padding: 0;
            margin: 0;
        }
        
        .page-title h1 {
            color: #ff69b4;
            font-size: 2.2em;
            margin: 0;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }
        
        .page-title p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1em;
            margin: 0;
        }
        
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin: 0;
            min-height: 300px;
            flex: 1;
        }
        
        .project-card {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 105, 180, 0.3);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            text-align: center;
            position: relative;
        }
        
        .project-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(255, 105, 180, 0.3);
            border-color: rgba(255, 105, 180, 0.5);
        }
        
        .project-image {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, #ff69b4, #ff1493);
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3em;
            color: white;
        }
        
        .project-card h3 {
            color: #ff69b4;
            font-size: 1.5em;
            margin: 0 0 15px 0;
        }
        
        .project-card p {
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.6;
            margin: 0 0 20px 0;
        }
        
        .project-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .btn {
            background: linear-gradient(135deg, #00f7ff, #0099cc);
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 20px;
            font-weight: 600;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 247, 255, 0.4);
        }
        
        .btn.github {
            background: linear-gradient(135deg, #4a90e2, #7b68ee);
        }
        
        .btn.github:hover {
            box-shadow: 0 4px 12px rgba(74, 144, 226, 0.4);
        }
        
        footer {
            text-align: center;
            padding: 30px 20px;
            background: rgba(0, 0, 0, 0.8);
            border-top: 1px solid rgba(255, 105, 180, 0.3);
            margin-top: 60px;
        }
        
        footer p {
            color: rgba(255, 255, 255, 0.8);
            margin: 0;
        }
        
        /* Add Project Button */
        .add-project-btn {
            background: linear-gradient(135deg, #4a90e2, #7b68ee);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin: 0 auto;
            display: block;
            font-size: 0.85em;
        }
        
        .add-project-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(74, 144, 226, 0.4);
        }
        
        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 10000;
        }
        
        .modal-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, rgba(255, 105, 180, 0.1), rgba(255, 20, 147, 0.1));
            border: 2px solid rgba(255, 105, 180, 0.3);
            border-radius: 20px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            backdrop-filter: blur(20px);
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .modal-header h3 {
            color: #ff69b4;
            margin: 0;
        }
        
        .close-modal {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            padding: 0;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.3s ease;
        }
        
        .close-modal:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        
        /* Project Form */
        .project-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .project-form .form-group {
            display: flex;
            flex-direction: column;
        }
        
        .project-form label {
            color: rgba(255, 255, 255, 0.9);
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .project-form input,
        .project-form textarea,
        .project-form select {
            padding: 12px;
            border: 1px solid rgba(255, 105, 180, 0.3);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        
        .project-form input:focus,
        .project-form textarea:focus,
        .project-form select:focus {
            outline: none;
            border-color: rgba(255, 105, 180, 0.5);
            box-shadow: 0 0 0 3px rgba(255, 105, 180, 0.2);
        }
        
        .project-form textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        .image-preview {
            margin-top: 10px;
            padding: 10px;
            border: 1px dashed rgba(255, 105, 180, 0.3);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.5);
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .image-preview img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 8px;
        }
        
        .submit-btn {
            background: linear-gradient(135deg, #4a90e2, #7b68ee);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(74, 144, 226, 0.4);
        }
        
        /* Editable Project Cards */
        .project-card.editing {
            border: 2px solid #4a90e2;
            box-shadow: 0 0 20px rgba(74, 144, 226, 0.3);
        }
        
        .project-card .edit-controls {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            gap: 5px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .project-card:hover .edit-controls {
            opacity: 1;
        }
        
        .edit-btn, .delete-btn {
            background: rgba(0, 0, 0, 0.8);
            border: none;
            color: white;
            padding: 5px 10px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s ease;
        }
        
        .edit-btn:hover {
            background: #4a90e2;
        }
        
        .delete-btn:hover {
            background: #ff4444;
        }
        
        .project-number {
            position: absolute;
            top: 10px;
            left: 10px;
            background: linear-gradient(135deg, #ff69b4, #ff1493);
            color: white;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 11px;
            font-weight: 700;
        }
        
        .empty-project {
            background: rgba(255, 255, 255, 0.05);
            border: 2px dashed rgba(255, 105, 180, 0.3);
            border-radius: 15px;
            padding: 30px 20px;
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            font-size: 1em;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        .empty-project h3 {
            color: #ff69b4;
            margin: 0 0 15px 0;
        }
        
        .empty-project p {
            margin: 8px 0;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <!-- NAVBAR -->
    <header>
        <nav class="navbar">
            <h2>@JOSEE'S FINEST</h2>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="admin-login.html">Admin</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="professional.html">Professional</a></li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <!-- PAGE TITLE -->
        <section class="page-title">
            <h1>🚀 My Projects</h1>
            <p>Welcome to my developer portfolio. Explore my latest projects and creations!</p>
            <button class="add-project-btn" onclick="addNewProject()">➕ Add New Project</button>
        </section>

        <!-- PROJECTS GRID -->
        <section class="projects-grid" id="projectsGrid">
            <!-- Projects will be loaded dynamically from Firebase -->
        </section>

        <!-- Add Project Modal -->
        <div id="addProjectModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>📝 Add New Project</h3>
                    <button class="close-modal" onclick="closeAddModal()">×</button>
                </div>
                <form class="project-form" id="addProjectForm">
                    <div class="form-group">
                        <label for="projectTitle">Project Title</label>
                        <input type="text" id="projectTitle" placeholder="Enter project title" required>
                    </div>
                    <div class="form-group">
                        <label for="projectDescription">Description</label>
                        <textarea id="projectDescription" placeholder="Enter project description" rows="3" required></textarea>
                    </div>
                    <div class="form-group">
                        <label for="projectUrl">Project URL</label>
                        <input type="url" id="projectUrl" placeholder="https://example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="projectCodeUrl">Code URL (Optional)</label>
                        <input type="url" id="projectCodeUrl" placeholder="https://github.com/username/repo">
                    </div>
                    <div class="form-group">
                        <label for="projectIcon">Icon/Emoji</label>
                        <input type="text" id="projectIcon" placeholder="🚀" maxlength="2">
                    </div>
                    <div class="form-group">
                        <label for="projectImage">Project Image</label>
                        <input type="file" id="projectImage" accept="image/*" onchange="previewImage(event)">
                        <div id="imagePreview" class="image-preview"></div>
                    </div>
                    <div class="form-group">
                        <label for="projectCategory">Category</label>
                        <select id="projectCategory" required>
                            <option value="">Select Category</option>
                            <option value="web">Web Development</option>
                            <option value="mobile">Mobile App</option>
                            <option value="design">Design</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <button type="submit" class="submit-btn">🚀 Add Project</button>
                </form>
            </div>
        </div>
    </div>

    <!-- FOOTER -->
    <footer>

        <!-- Firebase Scripts -->
        <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
        <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
        <script>
            // Initialize Firebase
            const firebaseConfig = {
                apiKey: "AIzaSyDdCAfblfC8HjcaIZFIi34WoA9hO0fXELY",
                authDomain: "josees-finest.firebaseapp.com",
                projectId: "josees-finest",
                storageBucket: "josees-finest.firebasestorage.app",
                messagingSenderId: "1023918542701",
                appId: "1:1023918542701:web:e087b978b61eaba1001464",
                measurementId: "G-Z8XPQ46GYG"
            };
            
            if (!firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
            }
            
            const db = firebase.firestore();
            
            // Load projects on page load
            document.addEventListener('DOMContentLoaded', function() {
                // Initialize Firebase
                const firebaseConfig = {
                    apiKey: "AIzaSyDdCAfblfC8HjcaIZFIi34WoA9hO0fXELY",
                    authDomain: "josees-finest.firebaseapp.com",
                    projectId: "josees-finest",
                    storageBucket: "josees-finest.firebasestorage.app",
                    messagingSenderId: "1023918542701",
                    appId: "1:1023918542701:web:e087b978b61eaba1001464",
                    measurementId: "G-Z8XPQ46GYG"
                };
                
                if (!firebase.apps.length) {
                    firebase.initializeApp(firebaseConfig);
                }
                
                const db = firebase.firestore();
                
                // Load projects from Firebase
                loadProjects();
                initializeDefaultProjects();
            });

            // Add new project modal
            function addNewProject() {
                // Check admin password first
                const password = prompt('🔐 Enter admin password to add a project:');
                if (password !== '4997G9749@j') {
                    alert('❌ Incorrect password. Access denied.');
                    return;
                }
                document.getElementById('addProjectModal').style.display = 'block';
            }

            // Close add modal
            function closeAddModal() {
                document.getElementById('addProjectModal').style.display = 'none';
                document.getElementById('addProjectForm').reset();
                document.getElementById('imagePreview').innerHTML = '';
            }

            // Preview image
            function previewImage(event) {
                const file = event.target.files[0];
                const preview = document.getElementById('imagePreview');
                
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        preview.innerHTML = `<img src="${e.target.result}" alt="Preview" />`;
                    };
                    reader.readAsDataURL(file);
                } else {
                    preview.innerHTML = '';
                }
            }

            // Handle add project form submission
            document.getElementById('addProjectForm').addEventListener('submit', function(e) {
                e.preventDefault();
                addNewProjectToFirebase();
            });

            // Add new project to Firebase
            async function addNewProjectToFirebase() {
                const title = document.getElementById('projectTitle').value;
                const description = document.getElementById('projectDescription').value;
                const projectUrl = document.getElementById('projectUrl').value;
                const codeUrl = document.getElementById('projectCodeUrl').value;
                const icon = document.getElementById('projectIcon').value || '🚀';
                const category = document.getElementById('projectCategory').value;
                const imageFile = document.getElementById('projectImage').files[0];
                
                if (!title || !description || !projectUrl || !category) {
                    alert('Please fill in all required fields');
                    return;
                }
                
                try {
                    let projectData = {
                        title: title,
                        description: description,
                        projectUrl: projectUrl,
                        codeUrl: codeUrl || '#',
                        icon: icon,
                        category: category,
                        featured: false,
                        status: 'pending', // pending editing and image upload
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    };
                    
                    // Handle image upload
                    if (imageFile) {
                        const reader = new FileReader();
                        reader.onload = async function(e) {
                            projectData.imageData = e.target.result;
                            projectData.imageType = imageFile.type;
                            projectData.hasImage = true;
                            
                            // Save to Firebase
                            await db.collection('projects').add(projectData);
                            console.log('✅ Project added with image:', title);
                            
                            // Close modal and reload
                            closeAddModal();
                            loadProjects();
                        };
                        reader.readAsDataURL(imageFile);
                    } else {
                        // Save without image
                        await db.collection('projects').add(projectData);
                        console.log('✅ Project added without image:', title);
                        
                        // Close modal and reload
                        closeAddModal();
                        loadProjects();
                    }
                    
                } catch (error) {
                    console.error('Error adding project:', error);
                    alert('❌ Failed to add project. Please try again.');
                }
            }

            // Initialize default projects if none exist
            function initializeDefaultProjects() {
                // Don't add default projects - start with empty page
                console.log('✅ Projects page initialized - ready for new projects');
            }

            // Load projects from Firebase
            function loadProjects() {
                db.collection('projects').orderBy('createdAt', 'desc').get()
                    .then((snapshot) => {
                        projects = [];
                        snapshot.forEach((doc) => {
                            projects.push({ id: doc.id, ...doc.data() });
                        });
                        displayProjects();
                    })
                    .catch((error) => {
                        console.error('Error loading projects:', error);
                        // Fallback to default display
                        displayDefaultProjects();
                    });
            }

            // Display projects
            function displayProjects() {
                const grid = document.getElementById('projectsGrid');
                
                if (projects.length === 0) {
                    grid.innerHTML = `
                        <div class="empty-project">
                            <div>
                                <h3>📝 No Projects Yet</h3>
                                <p>Start building your portfolio by clicking the "Add New Project" button above!</p>
                                <p>Your projects will appear here with beautiful cards and numbering.</p>
                            </div>
                        </div>
                    `;
                    return;
                }
                
                grid.innerHTML = '';
                projects.forEach((project, index) => {
                    const card = createProjectCard(project, index + 1);
                    grid.appendChild(card);
                });
            }

            // Create project card with numbering and editable features
            function createProjectCard(project, projectNumber) {
                const card = document.createElement('div');
                card.className = 'project-card';
                
                // Add editing class if pending
                if (project.status === 'pending') {
                    card.classList.add('editing');
                }
                
                // Format project number as 0.01, 0.02, etc.
                const formattedNumber = (projectNumber * 0.01).toFixed(2);
                
                // Handle image display
                let imageContent = '';
                if (project.hasImage && project.imageData) {
                    imageContent = `<img src="${project.imageData}" alt="${project.title}" style="width: 100%; height: 100%; object-fit: cover; border-radius: 10px;" />`;
                } else if (project.status === 'pending') {
                    imageContent = '<span style="font-size: 2em;">📝</span>';
                } else {
                    imageContent = project.icon || '🚀';
                }
                
                card.innerHTML = `
                    <div class="project-number">${formattedNumber}</div>
                    <div class="edit-controls">
                        <button class="edit-btn" onclick="editProject('${project.id}')">✏️</button>
                        <button class="delete-btn" onclick="deleteProject('${project.id}')">🗑️</button>
                    </div>
                    <div class="project-image">${imageContent}</div>
                    <h3>${project.title}</h3>
                    <p>${project.description}</p>
                    <div class="project-actions">
                        <a href="${project.projectUrl || '#'}" class="btn">View Project</a>
                        <a href="${project.codeUrl || '#'}" class="btn github">View Code</a>
                    </div>
                `;
                
                return card;
            }

            // Edit project (placeholder for future functionality)
            function editProject(projectId) {
                // Check admin password first
                const password = prompt('🔐 Enter admin password to edit this project:');
                if (password !== '4997G9749@j') {
                    alert('❌ Incorrect password. Access denied.');
                    return;
                }
                console.log('Edit project:', projectId);
                alert('✏️ Edit functionality coming soon! Project ID: ' + projectId);
            }

            // Delete project
            function deleteProject(projectId) {
                // Check admin password first
                const password = prompt('🔐 Enter admin password to delete this project:');
                if (password !== '4997G9749@j') {
                    alert('❌ Incorrect password. Access denied.');
                    return;
                }
                if (confirm('Are you sure you want to delete this project?')) {
                    db.collection('projects').doc(projectId).delete()
                        .then(() => {
                            console.log('Project deleted successfully');
                            loadProjects();
                        })
                        .catch((error) => {
                            console.error('Error deleting project:', error);
                        });
                }
            }
        
        // Close modals when clicking outside
        window.onclick = function(event) {
            const addModal = document.getElementById('addProjectModal');
            if (event.target === addModal) {
                closeAddModal();
            }
        }
        
        // Set current year
        document.getElementById('year').textContent = new Date().getFullYear();
    </script>
        <script src="js/code-rain.js"></script>
    </body>
</html>
