<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio - JOSEE'S FINEST</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            color: white;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px 0;
        }
        
        .header h1 {
            color: #ff69b4;
            font-size: 3em;
            margin: 0;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }
        
        .header p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.2em;
            margin: 10px 0 0 0;
        }
        
        .upload-section {
            background: rgba(255, 105, 180, 0.1);
            border: 1px solid rgba(255, 105, 180, 0.3);
            border-radius: 15px;
            padding: 30px;
            margin: 30px 0;
            backdrop-filter: blur(10px);
        }
        
        .upload-section h2 {
            color: #ff69b4;
            font-size: 1.8em;
            margin: 0 0 20px 0;
        }
        
        .upload-form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            align-items: end;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
        }
        
        .form-group label {
            color: rgba(255, 255, 255, 0.9);
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .form-group input, .form-group select {
            padding: 12px;
            border: 1px solid rgba(255, 105, 180, 0.3);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            font-size: 14px;
        }
        
        .form-group input[type="file"] {
            padding: 10px;
            background: rgba(255, 105, 180, 0.1);
        }
        
        .upload-btn {
            background: linear-gradient(135deg, #ff69b4, #ff1493);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .upload-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 105, 180, 0.4);
        }
        
        .documents-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin: 40px 0;
        }
        
        .document-card {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 105, 180, 0.3);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            position: relative;
        }
        
        .document-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(255, 105, 180, 0.3);
            border-color: rgba(255, 105, 180, 0.5);
        }
        
        .document-type {
            display: inline-block;
            background: linear-gradient(135deg, #00f7ff, #0099cc);
            color: white;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        
        .document-title {
            color: #ff69b4;
            font-size: 1.2em;
            font-weight: 600;
            margin: 0 0 10px 0;
        }
        
        .document-description {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9em;
            margin: 0 0 15px 0;
            line-height: 1.4;
        }
        
        .document-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .btn {
            background: linear-gradient(135deg, #00f7ff, #0099cc);
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 247, 255, 0.4);
        }
        
        .btn.delete {
            background: linear-gradient(135deg, #ff4444, #cc0000);
        }
        
        .btn.delete:hover {
            box-shadow: 0 4px 12px rgba(255, 68, 68, 0.4);
        }
        
        .btn.email {
            background: linear-gradient(135deg, #4a90e2, #7b68ee);
        }
        
        .btn.email:hover {
            box-shadow: 0 4px 12px rgba(74, 144, 226, 0.4);
        }
        
        .back-btn {
            background: linear-gradient(135deg, #00f7ff, #0099cc);
            color: white;
            text-decoration: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-weight: 600;
            display: inline-block;
            margin: 20px 0;
            transition: all 0.3s ease;
        }
        
        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 247, 255, 0.4);
        }
        
        .no-documents {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 1.2em;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 10000;
        }
        
        .modal-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, rgba(255, 105, 180, 0.1), rgba(255, 20, 147, 0.1));
            border: 2px solid rgba(255, 105, 180, 0.3);
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            backdrop-filter: blur(20px);
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .modal-header h3 {
            color: #ff69b4;
            margin: 0;
        }
        
        .close-modal {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }
        
        .form-group input[type="email"] {
            width: 100%;
        }
        
        .email-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .send-btn {
            background: linear-gradient(135deg, #4a90e2, #7b68ee);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .send-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(74, 144, 226, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📁 My Portfolio</h1>
            <p>Personal Document Management System</p>
            <a href="index.html" class="back-btn">← Back to Home</a>
        </div>
        
        <div class="upload-section">
            <h2>📤 Upload Document</h2>
            <form class="upload-form" id="uploadForm">
                <div class="form-group">
                    <label for="documentTitle">Document Title</label>
                    <input type="text" id="documentTitle" placeholder="e.g., CV, ID Card, Certificate" required>
                </div>
                <div class="form-group">
                    <label for="documentType">Document Type</label>
                    <select id="documentType" required>
                        <option value="">Select Type</option>
                        <option value="cv">CV/Resume</option>
                        <option value="id">ID Document</option>
                        <option value="certificate">Certificate</option>
                        <option value="portfolio">Portfolio</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="documentFile">Upload File (PDF or JPEG)</label>
                    <input type="file" id="documentFile" accept=".pdf,.jpg,.jpeg" required>
                </div>
                <div class="form-group">
                    <label for="documentDescription">Description</label>
                    <input type="text" id="documentDescription" placeholder="Brief description">
                </div>
                <button type="submit" class="upload-btn">📤 Upload Document</button>
            </form>
        </div>
        
        <div id="documentsContainer">
            <h2>📋 My Documents</h2>
            <div class="documents-grid" id="documentsGrid">
                <!-- Documents will be loaded here -->
            </div>
            <div class="no-documents" id="noDocuments" style="display: none;">
                <p>📭 No documents uploaded yet. Upload your first document above!</p>
            </div>
        </div>
    </div>
    
    <!-- Email Modal -->
    <div id="emailModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>📧 Send Document via Email</h3>
                <button class="close-modal" onclick="closeEmailModal()">×</button>
            </div>
            <form class="email-form" id="emailForm">
                <div class="form-group">
                    <label for="recipientEmail">Recipient Email</label>
                    <input type="email" id="recipientEmail" placeholder="recipient@example.com" required>
                </div>
                <div class="form-group">
                    <label for="emailMessage">Message (Optional)</label>
                    <input type="text" id="emailMessage" placeholder="Add a message...">
                </div>
                <button type="submit" class="send-btn">📧 Send Document</button>
            </form>
        </div>
    </div>
    
    <!-- Document Viewer Modal -->
    <div id="viewerModal" class="modal">
        <div class="modal-content" style="width: 90%; height: 90%; max-width: 800px; max-height: 600px;">
            <div class="modal-header">
                <h3 id="viewerTitle">📄 Document Viewer</h3>
                <button class="close-modal" onclick="closeViewerModal()">×</button>
            </div>
            <div id="viewerContent" style="width: 100%; height: calc(100% - 80px); overflow: auto;">
                <!-- Document content will be loaded here -->
            </div>
        </div>
    </div>
    
    <script>
        // Initialize Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyDdCAfblfC8HjcaIZFIi34WoA9hO0fXELY",
            authDomain: "josees-finest.firebaseapp.com",
            projectId: "josees-finest",
            storageBucket: "josees-finest.firebasestorage.app",
            messagingSenderId: "1023918542701",
            appId: "1:1023918542701:web:e087b978b61eaba1001464",
            measurementId: "G-Z8XPQ46GYG"
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        
        const db = firebase.firestore();
        let documents = [];
        let currentDocumentId = null;
        
        // Load documents on page load
        document.addEventListener('DOMContentLoaded', function() {
            loadDocuments();
        });
        
        // Upload form submission
        document.getElementById('uploadForm').addEventListener('submit', function(e) {
            e.preventDefault();
            uploadDocument();
        });
        
        // Email form submission
        document.getElementById('emailForm').addEventListener('submit', function(e) {
            e.preventDefault();
            sendDocumentEmail();
        });
        
        // Load documents from Firebase
        function loadDocuments() {
            db.collection('portfolio').orderBy('createdAt', 'desc').get()
                .then((snapshot) => {
                    documents = [];
                    snapshot.forEach((doc) => {
                        documents.push({ id: doc.id, ...doc.data() });
                    });
                    displayDocuments();
                })
                .catch((error) => {
                    console.error('Error loading documents:', error);
                });
        }
        
        // Display documents
        function displayDocuments() {
            const grid = document.getElementById('documentsGrid');
            const noDocuments = document.getElementById('noDocuments');
            
            if (documents.length === 0) {
                grid.style.display = 'none';
                noDocuments.style.display = 'block';
                return;
            }
            
            grid.style.display = 'grid';
            noDocuments.style.display = 'none';
            grid.innerHTML = '';
            
            documents.forEach((doc) => {
                const card = createDocumentCard(doc);
                grid.appendChild(card);
            });
        }
        
        // Create document card
        function createDocumentCard(doc) {
            const card = document.createElement('div');
            card.className = 'document-card';
            
            const fileExtension = doc.fileName.split('.').pop().toLowerCase();
            const fileType = fileExtension === 'pdf' ? 'PDF' : 'JPEG';
            
            card.innerHTML = `
                <div class="document-type">${fileType}</div>
                <h3 class="document-title">${doc.title}</h3>
                <p class="document-description">${doc.description || 'No description'}</p>
                <div class="document-actions">
                    <button class="btn" onclick="viewDocument('${doc.id}')">👁 View</button>
                    <button class="btn email" onclick="openEmailModal('${doc.id}')">📧 Email</button>
                    <button class="btn delete" onclick="deleteDocument('${doc.id}')">🗑️ Delete</button>
                </div>
            `;
            
            return card;
        }
        
        // Upload document
        function uploadDocument() {
            const title = document.getElementById('documentTitle').value;
            const type = document.getElementById('documentType').value;
            const file = document.getElementById('documentFile').files[0];
            const description = document.getElementById('documentDescription').value;
            
            if (!file) {
                alert('Please select a file to upload');
                return;
            }
            
            // Check file type
            const validTypes = ['application/pdf', 'image/jpeg', 'image/jpg'];
            if (!validTypes.includes(file.type)) {
                alert('Please upload only PDF or JPEG files');
                return;
            }
            
            // Read file as base64
            const reader = new FileReader();
            reader.onload = function(e) {
                const documentData = {
                    title: title,
                    type: type,
                    fileName: file.name,
                    fileData: e.target.result,
                    fileType: file.type,
                    description: description,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                };
                
                // Save to Firebase
                db.collection('portfolio').add(documentData)
                    .then((docRef) => {
                        console.log('Document uploaded with ID:', docRef.id);
                        alert('✅ Document uploaded successfully!');
                        
                        // Reset form
                        document.getElementById('uploadForm').reset();
                        
                        // Reload documents
                        loadDocuments();
                    })
                    .catch((error) => {
                        console.error('Error uploading document:', error);
                        alert('❌ Failed to upload document');
                    });
            };
            
            reader.readAsDataURL(file);
        }
        
        // View document
        function viewDocument(docId) {
            const doc = documents.find(d => d.id === docId);
            if (!doc) return;
            
            const modal = document.getElementById('viewerModal');
            const title = document.getElementById('viewerTitle');
            const content = document.getElementById('viewerContent');
            
            title.textContent = `📄 ${doc.title}`;
            
            if (doc.fileType === 'application/pdf') {
                content.innerHTML = `<embed src="${doc.fileData}" type="application/pdf" width="100%" height="100%" />`;
            } else {
                content.innerHTML = `<img src="${doc.fileData}" style="max-width: 100%; max-height: 100%; object-fit: contain;" />`;
            }
            
            modal.style.display = 'block';
        }
        
        // Close viewer modal
        function closeViewerModal() {
            document.getElementById('viewerModal').style.display = 'none';
        }
        
        // Open email modal
        function openEmailModal(docId) {
            currentDocumentId = docId;
            document.getElementById('emailModal').style.display = 'block';
        }
        
        // Close email modal
        function closeEmailModal() {
            document.getElementById('emailModal').style.display = 'none';
            document.getElementById('emailForm').reset();
            currentDocumentId = null;
        }
        
        // Send document email
        function sendDocumentEmail() {
            const recipientEmail = document.getElementById('recipientEmail').value;
            const message = document.getElementById('emailMessage').value;
            
            if (!currentDocumentId || !recipientEmail) {
                alert('Please provide recipient email');
                return;
            }
            
            const doc = documents.find(d => d.id === currentDocumentId);
            if (!doc) return;
            
            // Create email content
            const emailSubject = `Document: ${doc.title}`;
            const emailBody = `
                Hello,
                
                I'm sharing the following document with you:
                
                Document: ${doc.title}
                Type: ${doc.type}
                Description: ${doc.description || 'No description'}
                
                ${message ? `Message: ${message}` : ''}
                
                Best regards,
                JOSEE'S FINEST
            `;
            
            // Create mailto link
            const mailtoLink = `mailto:${recipientEmail}?subject=${encodeURIComponent(emailSubject)}&body=${encodeURIComponent(emailBody)}`;
            
            // Open email client
            window.open(mailtoLink);
            
            // Close modal
            closeEmailModal();
            
            alert('📧 Email client opened. You can send the document from your email application.');
        }
        
        // Delete document
        function deleteDocument(docId) {
            if (!confirm('Are you sure you want to delete this document?')) {
                return;
            }
            
            db.collection('portfolio').doc(docId).delete()
                .then(() => {
                    console.log('Document deleted successfully');
                    alert('✅ Document deleted successfully');
                    loadDocuments();
                })
                .catch((error) => {
                    console.error('Error deleting document:', error);
                    alert('❌ Failed to delete document');
                });
        }
        
        // Close modals when clicking outside
        window.onclick = function(event) {
            const emailModal = document.getElementById('emailModal');
            const viewerModal = document.getElementById('viewerModal');
            
            if (event.target === emailModal) {
                closeEmailModal();
            }
            if (event.target === viewerModal) {
                closeViewerModal();
            }
        }
    </script>
</body>
</html>
