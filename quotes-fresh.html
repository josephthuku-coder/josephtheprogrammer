<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📜 Fresh Quotes - Josee's Finest</title>
    <style>
        body {
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        .header h1 {
            color: #ff0050;
            font-size: 2.5em;
            margin: 0;
            text-shadow: 0 0 20px rgba(255, 0, 80, 0.5);
        }
        .quotes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }
        .quote-card {
            background: linear-gradient(145deg, #2d2d2d, #1a1a1a);
            border: 1px solid #333;
            border-radius: 15px;
            padding: 30px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .quote-card::before {
            content: '"';
            position: absolute;
            top: -20px;
            left: 10px;
            font-size: 100px;
            color: rgba(255, 0, 80, 0.1);
            font-family: Georgia, serif;
        }
        .quote-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(255, 0, 80, 0.3);
            border-color: rgba(255, 0, 80, 0.5);
        }
        .quote-text {
            font-size: 1.2em;
            line-height: 1.6;
            margin-bottom: 20px;
            font-style: italic;
            color: #e0e0e0;
            position: relative;
            z-index: 1;
        }
        .quote-author {
            text-align: right;
            color: #ff0050;
            font-weight: bold;
            font-size: 1.1em;
        }
        .quote-category {
            display: inline-block;
            background: linear-gradient(145deg, #ff0050, #ff0030);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8em;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }
        .refresh-btn {
            background: linear-gradient(145deg, #00f7ff, #00ff9f);
            color: #000;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: block;
            margin: 0 auto 40px;
        }
        .refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 247, 255, 0.4);
        }
        .stats-bar {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #333;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 20px;
        }
        .stat-item {
            text-align: center;
        }
        .stat-number {
            font-size: 2em;
            font-weight: bold;
            color: #00f7ff;
        }
        .stat-label {
            color: #ccc;
            font-size: 0.9em;
        }
        .filter-tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .filter-tab {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #444;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9em;
        }
        .filter-tab:hover {
            background: rgba(255, 0, 80, 0.2);
            border-color: #ff0050;
        }
        .filter-tab.active {
            background: linear-gradient(145deg, #ff0050, #ff0030);
            border-color: #ff0050;
        }
        .add-quote-btn {
            background: linear-gradient(145deg, #4caf50, #45a049);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 1000;
        }
        .add-quote-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(76, 175, 80, 0.4);
        }
        /* Navigation Buttons */
        .nav-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .nav-btn {
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.02));
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.4);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 255, 255, 0.2);
        }
        .nav-btn.active {
            background: linear-gradient(145deg, #ff0050, #ff0030);
            border-color: #ff0050;
        }
        /* Background Profiles */
        .background-profiles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }
        .background-profile {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 2s ease-in-out;
        }
        .background-profile.active {
            opacity: 0.8;
        }
        .background-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(26, 26, 26, 0.2), rgba(45, 45, 45, 0.3));
            z-index: -1;
        }
    </style>
</head>
<body>
    <!-- Background Profiles -->
    <div class="background-profiles" id="backgroundProfiles">
        <!-- Background images will be loaded here -->
    </div>
    <div class="background-overlay"></div>

    <div class="container">
        <div class="header">
            <h1>📜 Fresh Daily Quotes</h1>
            <p>Inspiring quotes that refresh every day</p>
        </div>

        <!-- Navigation Buttons -->
        <div class="nav-buttons">
            <a href="index.html" class="nav-btn">🏠 Home</a>
            <a href="fun.html" class="nav-btn">🎮 Fun</a>
            <a href="quotes-fresh.html" class="nav-btn active">📜 Quotes</a>
            <a href="projects.html" class="nav-btn">🚀 Projects</a>
            <a href="contact.html" class="nav-btn">📧 Contact</a>
            <a href="professional.html" class="nav-btn">💼 Professional</a>
        </div>

        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-number" id="totalQuotes">0</div>
                <div class="stat-label">Total Quotes</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="todayQuotes">0</div>
                <div class="stat-label">Today's Quotes</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="categoriesCount">0</div>
                <div class="stat-label">Categories</div>
            </div>
        </div>

        <div class="filter-tabs">
            <div class="filter-tab active" onclick="filterQuotes('all')">All Quotes</div>
            <div class="filter-tab" onclick="filterQuotes('motivation')">Motivation</div>
            <div class="filter-tab" onclick="filterQuotes('success')">Success</div>
            <div class="filter-tab" onclick="filterQuotes('wisdom')">Wisdom</div>
            <div class="filter-tab" onclick="filterQuotes('creativity')">Creativity</div>
            <div class="filter-tab" onclick="filterQuotes('leadership')">Leadership</div>
        </div>

        <button class="refresh-btn" onclick="refreshQuotes()">🔄 Get Fresh Quotes</button>

        <div class="quotes-grid" id="quotesGrid"></div>
    </div>

    <button class="add-quote-btn" onclick="addNewQuote()">➕ Add Quote</button>

    <script>
        // Fresh quotes database
        const freshQuotes = [
            {
                text: "Success is not final, failure is not fatal: it is the courage to continue that counts.",
                author: "Winston Churchill",
                category: "success",
                date: new Date().toISOString()
            },
            {
                text: "The only way to do great work is to love what you do.",
                author: "Steve Jobs",
                category: "motivation",
                date: new Date().toISOString()
            },
            {
                text: "Innovation distinguishes between a leader and a follower.",
                author: "Steve Jobs",
                category: "leadership",
                date: new Date().toISOString()
            },
            {
                text: "The future belongs to those who believe in the beauty of their dreams.",
                author: "Eleanor Roosevelt",
                category: "motivation",
                date: new Date().toISOString()
            },
            {
                text: "It is during our darkest moments that we must focus to see the light.",
                author: "Aristotle",
                category: "wisdom",
                date: new Date().toISOString()
            },
            {
                text: "Creativity is intelligence having fun.",
                author: "Albert Einstein",
                category: "creativity",
                date: new Date().toISOString()
            },
            {
                text: "The best time to plant a tree was 20 years ago. The second best time is now.",
                author: "Chinese Proverb",
                category: "wisdom",
                date: new Date().toISOString()
            },
            {
                text: "Don't watch the clock; do what it does. Keep going.",
                author: "Sam Levenson",
                category: "motivation",
                date: new Date().toISOString()
            },
            {
                text: "Whether you think you can or you think you can't, you're right.",
                author: "Henry Ford",
                category: "success",
                date: new Date().toISOString()
            },
            {
                text: "The only impossible journey is the one you never begin.",
                author: "Tony Robbins",
                category: "motivation",
                date: new Date().toISOString()
            },
            {
                text: "A leader is one who knows the way, goes the way, and shows the way.",
                author: "John C. Maxwell",
                category: "leadership",
                date: new Date().toISOString()
            },
            {
                text: "Imagination is more important than knowledge.",
                author: "Albert Einstein",
                category: "creativity",
                date: new Date().toISOString()
            },
            {
                text: "The way to get started is to quit talking and begin doing.",
                author: "Walt Disney",
                category: "success",
                date: new Date().toISOString()
            },
            {
                text: "Life is what happens when you're busy making other plans.",
                author: "John Lennon",
                category: "wisdom",
                date: new Date().toISOString()
            },
            {
                text: "The pessimist sees difficulty in every opportunity. The optimist sees opportunity in every difficulty.",
                author: "Winston Churchill",
                category: "motivation",
                date: new Date().toISOString()
            }
        ];

        let currentFilter = 'all';
        let displayedQuotes = [];

        // Initialize quotes
        function initQuotes() {
            // Check if we have saved quotes for today
            const today = new Date().toDateString();
            const savedDate = localStorage.getItem('quotesDate');
            
            if (savedDate === today) {
                // Load today's quotes
                displayedQuotes = JSON.parse(localStorage.getItem('todayQuotes') || '[]');
            } else {
                // Generate fresh quotes for today
                generateFreshQuotes();
            }
            
            displayQuotes();
            updateStats();
        }

        // Generate fresh quotes
        function generateFreshQuotes() {
            const today = new Date().toDateString();
            
            // Shuffle and select 8 random quotes
            const shuffled = [...freshQuotes].sort(() => 0.5 - Math.random());
            displayedQuotes = shuffled.slice(0, 8);
            
            // Add today's date to each quote
            displayedQuotes = displayedQuotes.map(quote => ({
                ...quote,
                date: new Date().toISOString()
            }));
            
            // Save to localStorage
            localStorage.setItem('todayQuotes', JSON.stringify(displayedQuotes));
            localStorage.setItem('quotesDate', today);
        }

        // Refresh quotes
        function refreshQuotes() {
            generateFreshQuotes();
            displayQuotes();
            updateStats();
        }

        // Display quotes
        function displayQuotes() {
            const grid = document.getElementById('quotesGrid');
            const filteredQuotes = currentFilter === 'all' 
                ? displayedQuotes 
                : displayedQuotes.filter(q => q.category === currentFilter);
            
            if (filteredQuotes.length === 0) {
                grid.innerHTML = `
                    <div style="grid-column: 1 / -1; text-align: center; padding: 60px; color: #999;">
                        <h3>📭 No Quotes Found</h3>
                        <p>No quotes found in this category</p>
                    </div>
                `;
                return;
            }
            
            grid.innerHTML = filteredQuotes.map(quote => `
                <div class="quote-card">
                    <div class="quote-category">${quote.category}</div>
                    <div class="quote-text">${quote.text}</div>
                    <div class="quote-author">— ${quote.author}</div>
                </div>
            `).join('');
        }

        // Filter quotes
        function filterQuotes(category) {
            currentFilter = category;
            
            // Update active tab
            document.querySelectorAll('.filter-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.classList.add('active');
            
            displayQuotes();
        }

        // Update statistics
        function updateStats() {
            document.getElementById('totalQuotes').textContent = displayedQuotes.length;
            document.getElementById('todayQuotes').textContent = displayedQuotes.length;
            
            const categories = [...new Set(displayedQuotes.map(q => q.category))];
            document.getElementById('categoriesCount').textContent = categories.length;
        }

        // Add new quote
        function addNewQuote() {
            const text = prompt('Enter quote text:');
            if (!text) return;
            
            const author = prompt('Enter author name:');
            if (!author) return;
            
            const category = prompt('Enter category (motivation/success/wisdom/creativity/leadership):');
            if (!category) return;
            
            const newQuote = {
                text: text,
                author: author,
                category: category.toLowerCase(),
                date: new Date().toISOString()
            };
            
            displayedQuotes.push(newQuote);
            localStorage.setItem('todayQuotes', JSON.stringify(displayedQuotes));
            displayQuotes();
            updateStats();
        }

        // Initialize on load
        document.addEventListener('DOMContentLoaded', function() {
            initQuotes();
            initBackgroundProfiles();
        });

        // Background Profiles System
        const backgroundProfiles = [
            "https://picsum.photos/seed/tropical-paradise/1920/1080.jpg",
            "https://picsum.photos/seed/mountain-majesty/1920/1080.jpg",
            "https://picsum.photos/seed/forest-serenity/1920/1080.jpg",
            "https://picsum.photos/seed/ocean-sunset/1920/1080.jpg",
            "https://picsum.photos/seed/romantic-sunset/1920/1080.jpg",
            "https://picsum.photos/seed/candlelight-dinner/1920/1080.jpg",
            "https://picsum.photos/seed/paris-romance/1920/1080.jpg",
            "https://picsum.photos/seed/garden-love/1920/1080.jpg"
        ];

        let currentBackgroundIndex = 0;
        let backgroundInterval;

        function initBackgroundProfiles() {
            const container = document.getElementById('backgroundProfiles');
            
            // Create background images
            backgroundProfiles.forEach((src, index) => {
                const img = document.createElement('img');
                img.src = src;
                img.className = 'background-profile';
                img.alt = `Background ${index + 1}`;
                if (index === 0) img.classList.add('active');
                container.appendChild(img);
            });
            
            // Start rotation
            startBackgroundRotation();
        }

        function startBackgroundRotation() {
            // Change background every 8 seconds
            backgroundInterval = setInterval(() => {
                rotateBackground();
            }, 8000);
        }

        function rotateBackground() {
            const backgrounds = document.querySelectorAll('.background-profile');
            
            // Remove active from current
            backgrounds[currentBackgroundIndex].classList.remove('active');
            
            // Move to next
            currentBackgroundIndex = (currentBackgroundIndex + 1) % backgrounds.length;
            
            // Add active to next
            backgrounds[currentBackgroundIndex].classList.add('active');
        }
    </script>
</body>
</html>
