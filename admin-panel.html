    <script>
        const ADMIN_PASSWORD = '4997G9749@j';
        
        // Check authentication - always require password
        function checkAuth() {
            // Always show login form - no persistent sessions
            showLoginForm();
        }

        // Show login form
        function showLoginForm() {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('adminPanel').style.display = 'none';
        }

        // Show admin panel
        function showAdminPanel() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            loadInboxMessages();
        }

        // Handle login
        document.getElementById('adminLoginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const password = document.getElementById('adminPassword').value;
            const messageDiv = document.getElementById('loginMessage');
            
            if (password === ADMIN_PASSWORD) {
                // No session storage - require password every time
                showAdminPanel();
                messageDiv.style.display = 'none';
                document.getElementById('adminPassword').value = '';
            } else {
                messageDiv.style.display = 'block';
                messageDiv.style.background = 'linear-gradient(145deg, #f44336, #d32f2f)';
                messageDiv.style.color = 'white';
                messageDiv.innerHTML = '❌ Incorrect password';
                setTimeout(() => {
                    messageDiv.style.display = 'none';
                }, 3000);
            }
        });

        // Unified Inbox System
        let currentInboxTab = 'all';
        let allMessages = [];

        function showInboxTab(tab) {
            currentInboxTab = tab;
            
            // Update active tab
            document.querySelectorAll('.inbox-tab-enhanced').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            // Filter and display messages
            displayInboxMessages();
        }

        function loadInboxMessages() {
            // Load from localStorage
            const comments = JSON.parse(localStorage.getItem('portfolioComments') || '[]');
            const contactMessages = JSON.parse(localStorage.getItem('contactMessages') || '[]');
            
            console.log('Debug - Comments:', comments);
            console.log('Debug - Contact Messages:', contactMessages);
            
            // Combine all messages
            allMessages = [];
            
            // Add comments
            comments.forEach(comment => {
                allMessages.push({
                    id: comment.id,
                    type: 'comment',
                    author: comment.name,
                    email: comment.email || '',
                    content: comment.content,
                    timestamp: comment.date,
                    read: comment.read || false
                });
            });
            
            // Add contact messages
            contactMessages.forEach(message => {
                allMessages.push({
                    id: message.id,
                    type: 'contact',
                    author: message.name,
                    email: message.email,
                    subject: message.subject || '',
                    content: message.message,
                    timestamp: message.timestamp,
                    read: message.read || false
                });
            });
            
            console.log('Debug - All Messages:', allMessages);
            
            // Sort by timestamp (newest first)
            allMessages.sort((a, b) => b.timestamp - a.timestamp);
            
            displayInboxMessages();
            updateInboxStats();
        }

        function displayInboxMessages() {
            const container = document.getElementById('inboxMessages');
            
            console.log('Debug - Displaying messages, total:', allMessages.length);
            console.log('Debug - Current tab:', currentInboxTab);
            
            // Filter messages based on current tab
            let filteredMessages = allMessages;
            if (currentInboxTab === 'comments') {
                filteredMessages = allMessages.filter(m => m.type === 'comment');
            } else if (currentInboxTab === 'contact') {
                filteredMessages = allMessages.filter(m => m.type === 'contact');
            }
            
            console.log('Debug - Filtered messages:', filteredMessages.length);
            
            if (filteredMessages.length === 0) {
                container.innerHTML = `
                    <div style="text-align: center; padding: 60px; color: #999;">
                        <h3>📭 No Messages</h3>
                        <p>No messages found in this category</p>
                    </div>
                `;
                updateTabCounts();
                return;
            }
            
            // Sort by timestamp (newest first)
            filteredMessages.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
            
            const htmlContent = filteredMessages.map(message => {
                console.log('Debug - Rendering message:', message);
                
                // Ensure message has required properties
                const safeMessage = {
                    id: message.id || Date.now(),
                    type: message.type || 'unknown',
                    author: message.author || message.name || 'Unknown',
                    email: message.email || '',
                    subject: message.subject || (message.type === 'contact' ? 'Contact Form Message' : 'Comment'),
                    content: message.content || message.message || 'No content',
                    timestamp: message.timestamp || message.date || Date.now(),
                    read: message.read || false
                };
                
                // Format timestamp perfectly
                const messageDate = new Date(safeMessage.timestamp);
                const formattedDate = messageDate.toLocaleDateString('en-US', {
                    weekday: 'short',
                    year: 'numeric',
                    month: 'short',
                    day: 'numeric'
                });
                const formattedTime = messageDate.toLocaleTimeString('en-US', {
                    hour: '2-digit',
                    minute: '2-digit'
                });
                const timeAgo = getTimeAgo(messageDate);
                
                return `
                <div class="message-item-enhanced ${safeMessage.type} ${!safeMessage.read ? 'unread' : ''}" id="message-${safeMessage.id}">
                    <div class="message-header-enhanced">
                        <span class="message-type-enhanced ${safeMessage.type}">${safeMessage.type.toUpperCase()}</span>
                        <span class="message-time-enhanced" title="${formattedDate} at ${formattedTime}">${timeAgo}</span>
                    </div>
                    <div class="message-content-enhanced">
                        <div class="message-author-enhanced">${safeMessage.author}</div>
                        ${safeMessage.email ? `<div class="message-email-enhanced">📧 ${safeMessage.email}</div>` : ''}
                        <div style="color: #ff0050; font-weight: 600; margin-bottom: 10px;">Subject: ${safeMessage.subject}</div>
                        <div class="message-text-enhanced">${safeMessage.content}</div>
                        <div style="color: #999; font-size: 0.85em; margin-top: 10px;">
                            📅 ${formattedDate} at ${formattedTime}
                        </div>
                    </div>
                    <div class="message-actions-enhanced">
                        ${safeMessage.type === 'contact' && safeMessage.email ? `<button class="reply-btn-enhanced" onclick="replyToMessage('${safeMessage.email}', '${safeMessage.author}', '${safeMessage.subject}')">📧 Reply</button>` : ''}
                        ${!safeMessage.read ? `<button class="mark-read-btn-enhanced" onclick="markAsRead(${safeMessage.id})">✓ Mark Read</button>` : ''}
                        <button class="delete-btn-enhanced" onclick="deleteMessage(${safeMessage.id})">🗑️ Delete</button>
                    </div>
                </div>
            `;
            }).join('');
            
            console.log('Debug - HTML content length:', htmlContent.length);
            container.innerHTML = htmlContent;
            
            updateTabCounts();
        }

        function getTimeAgo(date) {
            const now = new Date();
            const diffMs = now - date;
            const diffMins = Math.floor(diffMs / 60000);
            const diffHours = Math.floor(diffMs / 3600000);
            const diffDays = Math.floor(diffMs / 86400000);
            
            if (diffMins < 1) return 'Just now';
            if (diffMins < 60) return `${diffMins} minute${diffMins > 1 ? 's' : ''} ago`;
            if (diffHours < 24) return `${diffHours} hour${diffHours > 1 ? 's' : ''} ago`;
            if (diffDays < 7) return `${diffDays} day${diffDays > 1 ? 's' : ''} ago`;
            
            return date.toLocaleDateString();
        }

        function updateInboxStats() {
            const total = allMessages.length;
            const unread = allMessages.filter(m => !m.read).length;
            const today = allMessages.filter(m => {
                const messageDate = new Date(m.timestamp).toDateString();
                const todayDate = new Date().toDateString();
                return messageDate === todayDate;
            }).length;
            
            document.getElementById('totalMessages').textContent = total;
            document.getElementById('unreadMessages').textContent = unread;
            document.getElementById('todayMessages').textContent = today;
        }

        function updateTabCounts() {
            const allCount = allMessages.length;
            const commentsCount = allMessages.filter(m => m.type === 'comment').length;
            const contactCount = allMessages.filter(m => m.type === 'contact').length;
            
            // Update tab counts
            document.getElementById('allCount').textContent = allCount;
            document.getElementById('commentsCount').textContent = commentsCount;
            document.getElementById('contactCount').textContent = contactCount;
            
            // Add detailed information to tab titles
            const allTab = document.querySelector('.inbox-tab-enhanced[onclick*="all"]');
            const commentsTab = document.querySelector('.inbox-tab-enhanced[onclick*="comments"]');
            const contactTab = document.querySelector('.inbox-tab-enhanced[onclick*="contact"]');
            
            if (allTab) {
                const unreadAll = allMessages.filter(m => !m.read).length;
                allTab.setAttribute('title', `${allCount} total messages (${unreadAll} unread)`);
            }
            
            if (commentsTab) {
                const unreadComments = allMessages.filter(m => m.type === 'comment' && !m.read).length;
                const latestComment = allMessages.filter(m => m.type === 'comment')[0];
                const latestTime = latestComment ? getTimeAgo(new Date(latestComment.timestamp)) : 'No comments';
                commentsTab.setAttribute('title', `${commentsCount} comments (${unreadComments} unread) - Latest: ${latestTime}`);
            }
            
            if (contactTab) {
                const unreadContact = allMessages.filter(m => m.type === 'contact' && !m.read).length;
                const latestContact = allMessages.filter(m => m.type === 'contact')[0];
                const latestTime = latestContact ? getTimeAgo(new Date(latestContact.timestamp)) : 'No messages';
                contactTab.setAttribute('title', `${contactCount} contact messages (${unreadContact} unread) - Latest: ${latestTime}`);
            }
        }

        function markAsRead(messageId) {
            // Update in allMessages
            const message = allMessages.find(m => m.id === messageId);
            if (message) {
                message.read = true;
                
                // Update in localStorage
                if (message.type === 'comment') {
                    const comments = JSON.parse(localStorage.getItem('portfolioComments') || '[]');
                    const comment = comments.find(c => c.id === messageId);
                    if (comment) {
                        comment.read = true;
                        localStorage.setItem('portfolioComments', JSON.stringify(comments));
                    }
                } else if (message.type === 'contact') {
                    const contactMessages = JSON.parse(localStorage.getItem('contactMessages') || '[]');
                    const contactMessage = contactMessages.find(c => c.id === messageId);
                    if (contactMessage) {
                        contactMessage.read = true;
                        localStorage.setItem('contactMessages', JSON.stringify(contactMessages));
                    }
                }
                
                displayInboxMessages();
                updateInboxStats();
            }
        }

        function markAllAsRead() {
            if (!confirm('Mark all messages as read?')) return;
            
            allMessages.forEach(message => {
                message.read = true;
            });
            
            // Update localStorage
            const comments = JSON.parse(localStorage.getItem('portfolioComments') || '[]');
            const contactMessages = JSON.parse(localStorage.getItem('contactMessages') || '[]');
            
            comments.forEach(comment => comment.read = true);
            contactMessages.forEach(message => message.read = true);
            
            localStorage.setItem('portfolioComments', JSON.stringify(comments));
            localStorage.setItem('contactMessages', JSON.stringify(contactMessages));
            
            displayInboxMessages();
            updateInboxStats();
        }

        function deleteMessage(messageId) {
            if (!confirm('Are you sure you want to delete this message?')) return;
            
            // Remove from allMessages
            allMessages = allMessages.filter(m => m.id !== messageId);
            
            // Remove from localStorage
            const message = allMessages.find(m => m.id === messageId);
            if (message && message.type === 'comment') {
                const comments = JSON.parse(localStorage.getItem('portfolioComments') || '[]');
                const updatedComments = comments.filter(c => c.id !== messageId);
                localStorage.setItem('portfolioComments', JSON.stringify(updatedComments));
            } else {
                const contactMessages = JSON.parse(localStorage.getItem('contactMessages') || '[]');
                const updatedMessages = contactMessages.filter(c => c.id !== messageId);
                localStorage.setItem('contactMessages', JSON.stringify(updatedMessages));
            }
            
            displayInboxMessages();
            updateInboxStats();
        }

        function replyToMessage(email, author, subject) {
            const mailtoLink = `mailto:${email}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(`Dear ${author},\n\nThank you for your message. I have received your inquiry and will respond as soon as possible.\n\nBest regards,\nJosee's Finest`)}`;
            window.open(mailtoLink);
        }

        function refreshInbox() {
            loadInboxMessages();
        }

        function forceDisplayAll() {
            const container = document.getElementById('inboxMessages');

                </div>`;
            });
            
            html += '</div>';
            container.innerHTML = html;
            
            alert('Force display complete! Check console for detailed data.');
        }

        function clearInbox() {
            if (!confirm('Are you sure you want to clear all messages? This action cannot be undone.')) return;
            
            localStorage.removeItem('portfolioComments');
            localStorage.removeItem('contactMessages');
            allMessages = [];
            displayInboxMessages();
            updateInboxStats();
        }

            }
            
            // Initialize Firebase
            const firebaseConfig = {
                apiKey: "AIzaSyDdCAfblfC8HjcaIZFIi34WoA9hO0fXELY",
                authDomain: "josees-finest.firebaseapp.com",
                projectId: "josees-finest",
                storageBucket: "josees-finest.firebasestorage.app",
                messagingSenderId: "1023918542701",
                appId: "1:1023918542701:web:e087b978b61eaba1001464",
                measurementId: "G-Z8XPQ46GYG"
            };
            
            if (!firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
            }
            
            // Create content object
            const content = {
                type: contentType,
                title: title,
                description: description,
                url: url,
                thumbnail: thumbnail || `https://picsum.photos/seed/${title}/180/75.jpg`,
                likes: 0,
                views: 0,
                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                category: contentType
            };
            
            // Save to actual Firebase

                    // Clear form
                    document.getElementById('contentTitle').value = '';
                    document.getElementById('contentDescription').value = '';
                    document.getElementById('contentUrl').value = '';
                    document.getElementById('contentThumbnail').value = '';
                    
                    alert('✅ Content uploaded successfully to Firebase!');
                    
                    // Also save to localStorage as backup
                    let existingContent = JSON.parse(localStorage.getItem('firebaseContent') || '[]');
                    content.id = docRef.id;
                    existingContent.push(content);
                    localStorage.setItem('firebaseContent', JSON.stringify(existingContent));
                })
                .catch((error) => {
                    console.error('❌ Error uploading to Firebase:', error);
                    alert('❌ Failed to upload to Firebase. Please try again.');
                    
                    // Fallback to localStorage
                    let existingContent = JSON.parse(localStorage.getItem('firebaseContent') || '[]');
                    content.id = Date.now().toString();
                    existingContent.push(content);
                    localStorage.setItem('firebaseContent', JSON.stringify(existingContent));

                });
        }

        // Initialize on load
        document.addEventListener('DOMContentLoaded', function() {
            checkAuth();
        });
